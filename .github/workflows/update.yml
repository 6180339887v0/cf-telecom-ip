name: 更新电信优选IP
on:
  workflow_dispatch: {}
concurrency:
  group: update-ip
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scraper.py
        env:
          UOUIN_KEY: ${{ secrets.UOUIN_KEY }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update $(date -u +%FT%TZ)"
          git push
